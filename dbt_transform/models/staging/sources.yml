version: 2

sources:
  - name: topcv_raw
    database: "{{ env_var('DB_NAME') }}"
    schema: "{{ env_var('DB_SCHEMA') }}"
    description: "Raw data layer containing scraped job postings from TopCV"
    loaded_at_field: crawled_at

    freshness:
      warn_after:
        count: 25
        period: hour
      error_after:
        count: 48
        period: hour

    tables:
      - name: topcv_jobs
        description: "Raw job postings scraped from TopCV"

        columns:
          - name: job_url
            description: "Job posting URL from source; may repeat across snapshots"
            tests:
              - not_null
              
          - name: crawled_at
            description: "Timestamp when the job was scraped"
            tests:
              - not_null