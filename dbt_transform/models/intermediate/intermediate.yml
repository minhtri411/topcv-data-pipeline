version: 2

models:
  - name: int_job_snapshot_events
    description: "Normalized event-level job snapshots with snapshot grain and prepared metrics"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - job_bk
            - snapshot_ts
    columns:
      - name: job_bk
        description: "Job business key"
        tests:
          - not_null
      - name: company_bk
        description: "Company business key"
      - name: snapshot_ts
        description: "Snapshot timestamp"
        tests:
          - not_null
      - name: snapshot_date_id
        description: "Date key in YYYYMMDD"
        tests:
          - not_null
      - name: salary_min
        description: "Minimum salary in VND"
      - name: salary_max
        description: "Maximum salary in VND"

  - name: int_job_tags
    description: "Exploded multi-value tags from raw string into one row per tag"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - job_bk
            - snapshot_ts
            - tag_name_norm
    columns:
      - name: tag_name_norm
        description: "Normalized tag name"
        tests:
          - not_null

  - name: int_job_locations
    description: "Exploded job locations from working_addresses/location fields"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - job_bk
            - snapshot_ts
            - location_name_norm
    columns:
      - name: location_name_norm
        description: "Normalized location string"
        tests:
          - not_null

  - name: int_company_snapshot_source
    description: "Latest company record per business key as source for SCD2 snapshot"
    columns:
      - name: company_bk
        description: "Company business key"
        tests:
          - unique
          - not_null
      - name: updated_at
        description: "Timestamp used by snapshot process"
        tests:
          - not_null

  - name: int_job_snapshot_source
    description: "Latest job record per business key as source for SCD2 snapshot"
    columns:
      - name: job_bk
        description: "Job business key"
        tests:
          - unique
          - not_null
      - name: updated_at
        description: "Timestamp used by snapshot process"
        tests:
          - not_null
