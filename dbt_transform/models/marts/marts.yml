version: 2

models:
  - name: dim_source
    description: "Static source dimension"
    columns:
      - name: source_id
        description: "Source surrogate key"
        tests:
          - unique
          - not_null
      - name: source_name
        description: "Source name"
        tests:
          - not_null

  - name: dim_company
    description: "SCD2 company dimension derived from dbt snapshot"
    columns:
      - name: company_sk
        description: "Surrogate key for company SCD2 row"
        tests:
          - unique
          - not_null
      - name: dbt_scd_id
        description: "dbt snapshot SCD identifier"
        tests:
          - unique
          - not_null
      - name: company_id
        description: "Company business key"
        tests:
          - not_null

  - name: dim_job
    description: "SCD2 job dimension derived from dbt snapshot"
    columns:
      - name: job_sk
        description: "Surrogate key for job SCD2 row"
        tests:
          - unique
          - not_null
      - name: dbt_scd_id
        description: "dbt snapshot SCD identifier"
        tests:
          - unique
          - not_null
      - name: external_job_id
        description: "Job business key"
        tests:
          - not_null
      - name: source_id
        description: "Foreign key to dim_source"
        tests:
          - not_null
          - relationships:
              to: ref('dim_source')
              field: source_id

  - name: dim_date
    description: "Date dimension"
    columns:
      - name: date_id
        description: "Date key in YYYYMMDD"
        tests:
          - unique
          - not_null
      - name: date_day
        description: "Calendar date"
        tests:
          - not_null

  - name: dim_location
    description: "Static normalized location dimension"
    columns:
      - name: location_id
        description: "Location surrogate key"
        tests:
          - unique
          - not_null
      - name: location_code
        description: "Normalized location code"
        tests:
          - unique
          - not_null

  - name: dim_tag
    description: "Tag dimension for multi-value skill/category tags"
    columns:
      - name: tag_id
        description: "Tag surrogate key"
        tests:
          - unique
          - not_null
      - name: tag_name
        description: "Normalized tag name"
        tests:
          - unique
          - not_null

  - name: bridge_job_tags
    description: "Bridge table mapping job SCD2 rows to tags"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - job_sk
            - tag_id
    columns:
      - name: job_sk
        description: "Foreign key to dim_job"
        tests:
          - not_null
          - relationships:
              to: ref('dim_job')
              field: job_sk
      - name: tag_id
        description: "Foreign key to dim_tag"
        tests:
          - not_null
          - relationships:
              to: ref('dim_tag')
              field: tag_id

  - name: fct_job_snapshot
    description: "Fact snapshot at grain (job_bk, snapshot_ts)"
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - job_bk
            - snapshot_ts
      - expression_is_true:
          expression: "salary_min is null or salary_max is null or salary_min <= salary_max"
    columns:
      - name: job_bk
        description: "Job business key"
        tests:
          - not_null
      - name: snapshot_ts
        description: "Snapshot timestamp"
        tests:
          - not_null
      - name: job_sk
        description: "Foreign key to dim_job"
        tests:
          - not_null
          - relationships:
              to: ref('dim_job')
              field: job_sk
      - name: company_sk
        description: "Foreign key to dim_company"
        tests:
          - relationships:
              to: ref('dim_company')
              field: company_sk
      - name: location_id
        description: "Foreign key to dim_location"
        tests:
          - relationships:
              to: ref('dim_location')
              field: location_id
      - name: date_id
        description: "Foreign key to dim_date"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: deadline_date_id
        description: "Deadline date foreign key to dim_date"
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_id
      - name: salary_min
        description: "Salary minimum in VND"
      - name: salary_max
        description: "Salary maximum in VND"
